<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="INSPECTRA verifies the documents, title and fees on every listing — and certifies every realtor — so the only homes you find in Nigeria are ones you can trust."
    />

    <!-- Set the theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("inspectra-theme");
          var choice =
            stored === "light" || stored === "dark" || stored === "system"
              ? stored
              : "system";
          var dark =
            choice === "dark" ||
            (choice === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />

    <title>INSPECTRA — Verified homes. Certified realtors.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
